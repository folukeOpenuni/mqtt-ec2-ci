name: MQTT Protocol CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-2

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check tests/

  # ── Job 2: Provision EC2 ────────────────────────────────────────────────────
  provision:
    name: Provision EC2
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.ec2_ip }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="ssh_public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Get EC2 IP
        id: tf_output
        working-directory: terraform
        run: echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

      - name: Wait for EC2 bootstrap
        run: sleep 90

  # ── Job 3: Test ─────────────────────────────────────────────────────────────
  test:
    name: Run MQTT Tests
    runs-on: ubuntu-latest
    needs: provision
    permissions:
      checks: write
      pull-pull_requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.provision.outputs.ec2_ip }} >> ~/.ssh/known_hosts

      - name: Copy project to EC2
        run: |
          ssh ubuntu@${{ needs.provision.outputs.ec2_ip }} "mkdir -p /home/ubuntu/mqtt-ec2-ci"
          scp -r . ubuntu@${{ needs.provision.outputs.ec2_ip }}:/home/ubuntu/mqtt-ec2-ci

      - name: Run tests on EC2
        run: |
          ssh ubuntu@${{ needs.provision.outputs.ec2_ip }} << 'EOF'
            cd /home/ubuntu/mqtt-ec2-ci
            docker compose up --build --abort-on-container-exit --exit-code-from test-runner
          EOF

      - name: Retrieve test results
        if: always()
        run: |
          scp -r ubuntu@${{ needs.provision.outputs.ec2_ip }}:/home/ubuntu/mqtt-ec2-ci/reports ./reports || true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/results.xml

      - name: Upload test artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: mqtt-test-results
          path: reports/
          retention-days: 14

  # ── Job 4: Destroy ──────────────────────────────────────────────────────────
  destroy:
    name: Destroy EC2
    runs-on: ubuntu-latest
    needs: [provision, test]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var="ssh_public_key=${{ secrets.EC2_SSH_PUBLIC_KEY }}" \
            -var="aws_region=${{ env.AWS_REGION }}"





