services:

  broker:
    build:
      context: ./broker
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mqtt-net

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: mqtt-test-runner
    depends_on:
      broker:
        condition: service_healthy
    environment:
      MQTT_BROKER_HOST: broker
      MQTT_BROKER_PORT: 1883
    volumes:
      - ./reports:/app/reports
    networks:
      - mqtt-net

networks:
  mqtt-net:
    driver: bridge